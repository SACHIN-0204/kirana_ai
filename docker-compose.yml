# version: '3.9'

services:

  # ── MongoDB ─────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: kirana_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - kirana_net

  # ── Backend (Node/Express) ───────────────────────────────
  backend:
    build: ./backend
    container_name: kirana_backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/kirana_db
      ML_SERVICE_URL: http://ml_service:8000
    depends_on:
      - mongo
      - ml_service
    networks:
      - kirana_net

  # ── ML Service (Python/Flask) ────────────────────────────
  ml_service:
    build: ./ml-service
    container_name: kirana_ml
    restart: unless-stopped
    ports:
      - "8000:8000"        # ✅ host:container
    networks:
      - kirana_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s   # ✅ Give Prophet time to load

  # ── Frontend (React + Nginx) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        REACT_APP_API_URL: http://localhost:5000/api
    container_name: kirana_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - kirana_net

volumes:
  mongo_data:

networks:
  kirana_net:
    driver: bridge